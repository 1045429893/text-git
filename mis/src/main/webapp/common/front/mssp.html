<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>秒杀商品</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="other/layui/css/layui.css" media="all" />
    <link rel="stylesheet" type="text/css" href="font/font-awesome-4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="css/system/btable.css" />
</head>

<body style=" background-color: gainsboro;">
    <div style="margin:0px; background-color: white;">
        <blockquote class="layui-elem-quote">
            <form accept-charset="UTF-8" action="search.html" method="get" style="">
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="layui-icon">&#xe608;</i> 添加
                </a>
                 <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-pencil-square-o fa-lg"></i> 修改
                </a>
                 <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-trash fa-lg"></i> 删除
                </a>
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-eye fa-lg"></i> 查看
                </a> 
                <div style=" margin-top:15px;">
                    <label class="" style="line-height: 30px; display: inline-block;">活动名称：</label>
                    <div class="layui-input-inline">
                        <select name="modules" lay-verify="required" lay-search="" >
                            <option value="">请选择</option>
                            <option value="1"></option>
                            <option value="2"></option>
                            <option value="3"></option>
                        </select>
                    </div>
                    
                    <label style="line-height: 30px; display: inline-block;">商品名称：</label>
                    <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                     <div class="layui-form-pane" style=" display: inline-block;">
                        <label class="layui-form-label">选取时间</label>
                        <div class="layui-input-inline">
                            <!-- <input class="layui-input" placeholder="开始时间" id="LAY_demorange_s"   onclick="layui.laydate({elem: this, istime: true, format: 'YYYY-MM-DD hh:mm:ss'})"> -->
                             <input class="layui-input" placeholder="开始时间" onclick="layui.laydate({elem: this, istime: true, format: 'YYYY-MM-DD hh:mm:ss'})">
                        </div>
                        <div class="layui-input-inline">
                           <!--  <input class="layui-input" placeholder="结束时间" id="LAY_demorange_e"> -->
                           <input class="layui-input" placeholder="结束时间" onclick="layui.laydate({elem: this, istime: true, format: 'YYYY-MM-DD hh:mm:ss'})" >
                        </div>
                    </div>
                    <button class="layui-btn layui-btn-small" name="button" type="submit" id="search"><i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
                
            </form>
        </blockquote>
        <div id="content" style="width: 100%;height: 533px;"></div>
    </div>
    <script type="text/javascript" src="other/layui/layui.js"></script>
    <script>
    layui.config({
        base: 'js/'
    }).use(['btable'], function() {
        var btable = layui.btable(),
            $ = layui.jquery;

        btable.set({
            elem: '#content',
            url: 'other/datas/btable_data.json',
            pageSize: 3,
            columns: [{
                fieldName: '商品名称',
                field: 'name'
            }, {
                fieldName: '活动名称',
                field: 'name'
            }, {
                fieldName: '秒杀价',
                field: 'name'
            }, {
                fieldName: '指导价',
                field: 'name'
            }, {
                fieldName: '抢购价',
                field: 'name'
            }, {
                fieldName: '库存',
                field: 'name'
            }, {
                fieldName: '排序',
                field: 'createtime'
            }, {
                fieldName: '创建时间',
                field: 'createtime'
            }],
            even: true,
            //skin: 'row',
            checkbox: true,
            paged: true,
            singleSelect: false
        });
        btable.render();

        $('#getAll').on('click', function() {

            //btable.getSelected(function(obj){
            //  console.log(obj.elem);
            //  layer.msg(obj.id);
            //});
            //获取选择的数据
            btable.getSelections(function(obj) {
                console.log(obj.elem);
                console.log(obj.ids);
                console.log(obj.count);
                layer.msg(obj.ids.join(','))
            });

        });

        $(window).on('resize', function(e) {
            var $that = $(this);
            $('#content').height($that.height() - 92);
        }).resize();
    });
    </script>
    <script>
    layui.use('laydate', function() {
        var laydate = layui.laydate;

        var start = {
            min: laydate.now(),
            max: '2099-06-16 23:59:59',
            istoday: false,
            choose: function(datas) {
                end.min = datas; //开始日选好后，重置结束日的最小日期
                end.start = datas //将结束日的初始值设定为开始日
            }
        };

        var end = {
            min: laydate.now(),
            max: '2099-06-16 23:59:59',
            istoday: false,
            choose: function(datas) {
                start.max = datas; //结束日选好后，重置开始日的最大日期
            }
        };

        document.getElementById('LAY_demorange_s').onclick = function() {
            start.elem = this;
            laydate(start);
        }
        document.getElementById('LAY_demorange_e').onclick = function() {
            end.elem = this
            laydate(end);
        }

    });
    </script>
    <!-- 时间选取 -->
</body>

</html>
