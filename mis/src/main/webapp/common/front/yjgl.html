<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>邮寄管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="/common/front/layui/css/layui.css" media="all" />
    <link rel="stylesheet" type="text/css" href="/common/front/font/font-awesome-4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="/common/front/css/system/btable.css" />
</head>

<body style=" background-color: gainsboro;">
    <div style="margin:0px; background-color: white;">
        <blockquote class="layui-elem-quote">
            <form accept-charset="UTF-8" action="search.html" method="get" style="">
                <div style="margin-top: 20px;">
                    <label style="line-height: 30px; display: inline-block;">挪车号：</label>
                    <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                    <label style="line-height: 30px; display: inline-block;">手机号：</label>
                    <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                    <label style="line-height: 30px; display: inline-block;">车牌号：</label>
                    <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                    <div class="layui-form-pane" style=" display: inline-block;">
                            <label class="layui-form-label">时间选取</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" placeholder="开始日" id="LAY_demorange_s">
                            </div>
                            <div class="layui-input-inline">
                                <input class="layui-input" placeholder="截止日" id="LAY_demorange_e">
                            </div>
                        </div>
                    <button class="layui-btn layui-btn-small" name="button" type="submit" id="search"><i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
            </form>
        </blockquote>
        <div id="content" style="width: 100%;height: 533px;">
            <table class="layui-table" lay-data="{height:315, url:'/common/front/datas/test.json', page:true, id:'test'}" lay-filter="test">
                <thead>
                <tr>
                    <th lay-data="{field:'id', width:80, sort: true}">挪车号</th>
                    <th lay-data="{field:'username', width:80}">手机号</th>
                    <th lay-data="{field:'sex', width:80, sort: true}">车牌号</th>
                    <th lay-data="{field:'city', width:80}">购买时间</th>
                    <th lay-data="{field:'sign', width:177}">邮寄地址</th>
                </tr>
                </thead>
            </table>
        </div>
    </div>

    <script type="text/javascript" src="/common/front/layui/layui.js"></script>
    <script>
        layui.use('laydate', function() {
            var laydate = layui.laydate;

            var start = {
                min: laydate.now(),
                max: '2099-06-16 23:59:59',
                istoday: false,
                choose: function(datas) {
                    end.min = datas; //开始日选好后，重置结束日的最小日期
                    end.start = datas //将结束日的初始值设定为开始日
                }
            };

            var end = {
                min: laydate.now(),
                max: '2099-06-16 23:59:59',
                istoday: false,
                choose: function(datas) {
                    start.max = datas; //结束日选好后，重置开始日的最大日期
                }
            };

            document.getElementById('LAY_demorange_s').onclick = function() {
                start.elem = this;
                laydate(start);
            }
            document.getElementById('LAY_demorange_e').onclick = function() {
                end.elem = this
                laydate(end);
            }

        });
    </script><!-- 时间选取 -->
    <script>
        layui.use('table', function() {
            var table = layui.table;
        });
        layui.use('layer', function() {
            var $ = layui.jquery,
                layer = layui.layer;

            $('#add').on('click', function() {
                layer.open({
                    title: '添加',
                    maxmin: true,
                    type: 2,
                    skin: 'layui-layer-rim',
                    content: 'other/temp/edit-form.html',
                    area: ['500px', '450px'], //宽高
                    btn: [ '关闭'],
                    shade: false,
                });
            });
        });
    </script>

</body>

</html>
