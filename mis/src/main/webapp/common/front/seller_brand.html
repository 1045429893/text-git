<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="/common/front/layui/css/layui.css" media="all" />
    <link rel="stylesheet" type="text/css" href="font/font-awesome-4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="/common/front/css/system/btable.css" />
</head>

<body style=" background-color: gainsboro;">
<div style="margin:0px; background-color: white;">
    <blockquote class="layui-elem-quote">
        <form accept-charset="UTF-8" action="search.html" method="get" style="">
            <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                <i class="layui-icon">&#xe608;</i> 添加
            </a>
            <a href="javascript:;" class="layui-btn layui-btn-small">
                <i class="fa fa-pencil-square-o fa-lg"></i> 修改
            </a>
            <a href="javascript:;" class="layui-btn layui-btn-small">
                <i class="fa fa-trash fa-lg"></i> 删除
            </a>
            <a href="javascript:;" class="layui-btn layui-btn-small">
                <i class="fa fa-eye fa-lg"></i> 查看
            </a>
            <div style="margin-left: 20px; display: inline-block;">
                <label style="line-height: 30px; display: inline-block;">权限名称：</label>
                <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                <button class="layui-btn layui-btn-small" name="button" type="submit" id="search"><i class="layui-icon"></i> 查询
                </button>
            </div>
        </form>
    </blockquote>
    <div id="content" style="width: 100%;height: 533px;">
        <table class="layui-table" id="layui-table-id" lay-data="{width:500,width:1000,loading:true,
            limit:10,height:315, url:'/common/front/datas/test.json', page:true, id:'test'}" lay-filter="test">
            <thead>
            <tr>
                <th lay-data="{checkbox:true}"></th>
                <th lay-data="{field:'id', width:80, sort: true}">ID</th>
                <th lay-data="{field:'username', width:80}">用户名</th>
                <th lay-data="{field:'sex', width:80, sort: true}">性别</th>
                <th lay-data="{field:'city', width:80}">城市</th>
                <th lay-data="{field:'experience', width:80, sort: true}">积分</th>
                <th lay-data="{field:'score', width:80, sort: true}">评分</th>
                <th lay-data="{fixed: 'right', width:150, align:'center', toolbar: '#barDemo'}"></th>
            </tr>
            </thead>
        </table>
    </div>
</div>
<script type="text/javascript" src="/common/front/layui/layui.js"></script>
<script>
    layui.use('table', function() {
        var table = layui.table;
        table.on('tool(test)', function(obj){ //注：tool是工具条事件名，test是table原始容器的属性 lay-filter="对应的值"
            var data = obj.data; //获得当前行数据
            var layEvent = obj.event; //获得 lay-event 对应的值
            var tr = obj.tr; //获得当前行 tr 的DOM对象

            if(layEvent === 'detail'){ //查看
                //do somehing
            } else if(layEvent === 'del'){ //删除
                layer.confirm('真的删除行么', function(index){
                    obj.del(); //删除对应行（tr）的DOM结构
                    layer.close(index);
                    //向服务端发送删除指令
                });
            } else if(layEvent === 'edit'){ //编辑
                //do something

                //同步更新缓存对应的值
                obj.update({
                    username: '123'
                    ,title: 'xxx'
                });
            }
        });
    });
    layui.use('layer', function() {
        var $ = layui.jquery,
            layer = layui.layer;

        $('#add').on('click', function() {
            layer.open({
                title: '添加',
                maxmin: true,
                type: 2,
                skin: 'layui-layer-rim',
                content: 'other/temp/edit-form.html',
                area: ['500px', '450px'], //宽高
                btn: [ '关闭'],
                shade: false,
            });
        });
    });
</script>

<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-mini" lay-event="detail">查看</a>
    <a class="layui-btn layui-btn-mini" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-mini" lay-event="del">删除</a>
</script>
</body>

</html>
