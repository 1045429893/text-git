<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>活动专场</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="/common/front/layui/css/layui.css" media="all" />
    <link rel="stylesheet" type="text/css" href="/common/front/font/font-awesome-4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="/common/front/css/system/btable.css" />
</head>

<body style=" background-color: gainsboro;">
    <div style="margin:0px; background-color: white;">
        <blockquote class="layui-elem-quote">
            <form accept-charset="UTF-8" action="search.html" method="get" style="">
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="layui-icon">&#xe608;</i> 添加
                </a>
                 <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-pencil-square-o fa-lg"></i> 修改
                </a>
                 <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-trash fa-lg"></i> 删除
                </a>
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-eye fa-lg"></i> 查看
                </a>
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-check fa-lg"></i> 开启活动
                </a>
                <a href="javascript:;" class="layui-btn layui-btn-small" id="add">
                    <i class="fa fa-close fa-lg"></i> 关闭活动
                </a>
                 
                <div style=" margin-top:15px;">
                    
                    <label style="line-height: 30px; display: inline-block;">活动名称：</label>
                    <input autocomplete="off" class="search-query span2" name="" placeholder="" value="" type="text" style="line-height: 28px; position: relative; top:2px; padding-left: 2px;">
                     <div class="layui-form-pane" style=" display: inline-block;">
                        <label class="layui-form-label">时间选取</label>
                        <div class="layui-input-inline">
                            <!-- <input class="layui-input" placeholder="开始时间" id="LAY_demorange_s"> -->
                            <input class="layui-input" placeholder="开始时间" onclick="layui.laydate({elem: this, istime: true, format: 'YYYY-MM-DD hh:mm:ss'})">
                        </div>
                        <div class="layui-input-inline">
                            <!-- <input class="layui-input" placeholder="结束时间" id="LAY_demorange_e"> -->
                             <input class="layui-input" placeholder="结束时间" onclick="layui.laydate({elem: this, istime: true, format: 'YYYY-MM-DD hh:mm:ss'})" >
                        </div>
                    </div>
                    <button class="layui-btn layui-btn-small" name="button" type="submit" id="search"><i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
                
            </form>
        </blockquote>
        <div id="content" style="width: 100%;height: 533px;">
            <table class="layui-table" lay-data="{height:315, url:'/common/front/datas/test.json', page:true, id:'test'}" lay-filter="test">
                <thead>
                <tr>
                    <th lay-data="{field:'id', width:80, sort: true}">活动名称</th>
                    <th lay-data="{field:'username', width:80}">标题</th>
                    <th lay-data="{field:'sex', width:80, sort: true}">开始时间</th>
                    <th lay-data="{field:'id', width:80, sort: true}">结束时间</th>
                    <th lay-data="{field:'username', width:80}">预约人数</th>
                    <th lay-data="{field:'sex', width:80, sort: true}">活动状态</th>
                    <th lay-data="{field:'sex', width:80, sort: true}">显示状态</th>
                </tr>
                </thead>

            </table>
        </div>
    </div>
    <script type="text/javascript" src="/common/front/layui/layui.js"></script>
    <script>
        layui.use('laydate', function() {
            var laydate = layui.laydate;

            var start = {
                min: laydate.now(),
                max: '2099-06-16 23:59:59',
                istoday: false,
                choose: function(datas) {
                    end.min = datas; //开始日选好后，重置结束日的最小日期
                    end.start = datas //将结束日的初始值设定为开始日
                }
            };

            var end = {
                min: laydate.now(),
                max: '2099-06-16 23:59:59',
                istoday: false,
                choose: function(datas) {
                    start.max = datas; //结束日选好后，重置开始日的最大日期
                }
            };

            document.getElementById('LAY_demorange_s').onclick = function() {
                start.elem = this;
                laydate(start);
            }
            document.getElementById('LAY_demorange_e').onclick = function() {
                end.elem = this
                laydate(end);
            }

        });
    </script><!-- 时间选取 -->
    <script>
        layui.use('table', function() {
            var table = layui.table;
        });
        layui.use('layer', function() {
            var $ = layui.jquery,
                layer = layui.layer;

            $('#add').on('click', function() {
                layer.open({
                    title: '添加',
                    maxmin: true,
                    type: 2,
                    skin: 'layui-layer-rim',
                    content: 'other/temp/edit-form.html',
                    area: ['500px', '450px'], //宽高
                    btn: [ '关闭'],
                    shade: false,
                });
            });
        });
    </script>

</body>

</html>
